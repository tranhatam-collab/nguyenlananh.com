<!doctype html>
<html lang="vi" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Đăng nhập Admin | Nguyễn Lan Anh</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="canonical" href="https://admin.nguyenlananh.com/login/" />
  <link rel="stylesheet" href="/assets/site.css" />
  <meta property="og:title" content="Đăng nhập Admin | Nguyễn Lan Anh" />
</head>
<body data-page="admin-login">
  <main class="container" role="main" style="max-width:480px; margin-top:8vh;">
    <section class="panel" id="admin-login-panel">
      <div style="text-align:center; margin-bottom:24px;">
        <img src="/assets/brand/logo-mark.svg" alt="" width="56" height="56" style="margin:0 auto;" />
        <h1 style="font-size:24px; margin:12px 0 4px;">Nền quản trị</h1>
        <p class="meta" style="margin:0;">Nguyễn Lan Anh — nội bộ</p>
      </div>

      <form id="admin-login-form" autocomplete="off" novalidate>
        <div class="field">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" autocomplete="username" placeholder="admin@nguyenlananh.com" required />
        </div>
        <div class="field">
          <label for="login-password">Mật khẩu</label>
          <input id="login-password" type="password" autocomplete="current-password" placeholder="••••••••" required />
        </div>
        <div class="actionsRow">
          <div id="turnstile-admin-login" class="cf-turnstile" style="margin-bottom:12px;"></div>
          <button id="login-submit" class="cta" type="submit" style="width:100%;">Đăng nhập</button>
        </div>
        <p id="login-error" class="note" style="color:#c0392b; display:none;"></p>
        <p id="login-info" class="note" style="display:none;"></p>
      </form>

      <hr style="margin:24px 0; border:none; border-top:1px solid rgba(0,0,0,.08);" />
      <p class="meta" style="text-align:center; font-size:13px;">
        Chỉ dành cho thành viên đội ngũ được cấp quyền.<br />
        <a href="/" style="font-size:12px;">← Về trang chủ</a>
      </p>
    </section>
  </main>

  <script src="/assets/turnstile-config.js"></script>
  <script src="/assets/turnstile.js"></script>
<script src="/assets/admin-login.js"></script>
</body>
</html>
