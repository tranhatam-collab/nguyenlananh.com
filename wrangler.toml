# Generated by Wrangler on Wed Apr 29 2026 11:15:40 GMT+0700 (Indochina Time)
# CANONICAL project name = nguyenlananh-com (NOT nguyenlananh-com-63s — that
# is only the random pages.dev subdomain suffix). Verified 2026-06-03 via
# wrangler pages project list. This project owns domains nguyenlananh.com,
# www.nguyenlananh.com, admin.nguyenlananh.com on account 62d57eaa... .
name = "nguyenlananh-com"
# Repo root holds BOTH static assets (index.html, assets/, en/ …) and the
# functions/ directory. An empty output dir made the Git-connected build skip
# Functions compilation (no _routes.json, /api/* served as static 404/405).
# "." = project root; Cloudflare special-cases the top-level functions/ dir and
# compiles it into Pages Functions instead of serving it as static assets.
pages_build_output_dir = "."
compatibility_date = "2026-02-09"

# NOTE: account_id is NOT supported in wrangler.toml for Pages projects.
# Use env var CLOUDFLARE_ACCOUNT_ID=62d57eaa548617aeecac766e5a1cb98e instead.
# (Already exported in deploy scripts.)

[env.production]

[[env.production.d1_databases]]
binding = "PAYMENTS_DB"
database_name = "nguyenlananh-payments-prod"
# Pages project nguyenlananh-com lives on account 62d57eaa (Anhhatam); a Pages
# deployment can only bind D1 databases in the SAME account. The previous id
# (2f3a3331…) was the copy on the Tranhatam/f3f9e76 account and is unreachable
# from this project → deploy failed. Corrected 2026-06-11 to the 62d57eaa copy.
database_id = "16dfc26d-ed33-4dc1-a349-6e216860ae05"

# [triggers]
# crons = ["0 9 * * *"]

[env.production.vars]
# Email provider: "mail_iai_one" (default) or "resend" (temporary fallback).
# Set secret RESEND_API_KEY via: wrangler pages secret put RESEND_API_KEY
# Set secret MAIL_API_KEY via: wrangler pages secret put MAIL_API_KEY
EMAIL_PROVIDER = "mail_iai_one"
MAIL_API_BASE_URL = "https://api.mail.iai.one/v1"
EMAIL_FROM = "Nguyen Lan Anh <hello@nguyenlananh.com>"
EMAIL_FROM_NOREPLY = "Nguyen Lan Anh <noreply@nguyenlananh.com>"
EMAIL_FROM_PAY = "pay@nguyenlananh.com"
EMAIL_FROM_SYSTEM = "noreply@nguyenlananh.com"
EMAIL_REPLY_TO_SUPPORT = "support@nguyenlananh.com"
MAIL_API_WORKSPACE_ID = "nguyenlananh.com"
# Turnstile site key (public, safe to expose). Set TURNSTILE_SECRET_KEY via:
#   CLOUDFLARE_ACCOUNT_ID=62d57eaa... npx wrangler pages secret put TURNSTILE_SECRET_KEY --project-name=nguyenlananh-com
# TURNSTILE_SITE_KEY = "0x4XXXXXXXX..."  # Uncomment after creating widget on dash.cloudflare.com

# Preview env KHÔNG dùng D1 cho đến khi có preview DB riêng.
# Tạo preview DB: wrangler d1 create nguyenlananh-payments-preview
