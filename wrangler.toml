# Generated by Wrangler on Wed Apr 29 2026 11:15:40 GMT+0700 (Indochina Time)
# CANONICAL project name = nguyenlananh-com (NOT nguyenlananh-com-63s — that
# is only the random pages.dev subdomain suffix). Verified 2026-06-03 via
# wrangler pages project list. This project owns domains nguyenlananh.com,
# www.nguyenlananh.com, admin.nguyenlananh.com on account 62d57eaa... .
name = "nguyenlananh-com"
# Repo root holds BOTH static assets (index.html, assets/, en/ …) and the
# functions/ directory. An empty output dir made the Git-connected build skip
# Functions compilation (no _routes.json, /api/* served as static 404/405).
# "." = project root; Cloudflare special-cases the top-level functions/ dir and
# compiles it into Pages Functions instead of serving it as static assets.
pages_build_output_dir = "."
compatibility_date = "2026-02-09"

# NOTE: account_id is NOT supported in wrangler.toml for Pages projects.
# Use env var CLOUDFLARE_ACCOUNT_ID=62d57eaa548617aeecac766e5a1cb98e instead.
# (Already exported in deploy scripts.)

[env.production]

[[env.production.d1_databases]]
binding = "PAYMENTS_DB"
database_name = "nguyenlananh-payments-prod"
database_id = "2f3a3331-546b-44f1-9992-57d18705afd5"

[triggers]
crons = ["0 9 * * *"]

[env.production.vars]
