<svg width="760" height="380" viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hành trình nhìn lại — từ vòng lặp đến bước tiếp">
  <defs>
    <linearGradient id="jg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="jg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="jglow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="jglow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <filter id="jblur">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="760" height="380" rx="20" fill="#fafafe"/>

  <!-- Glow blobs -->
  <ellipse cx="180" cy="200" rx="170" ry="145" fill="url(#jglow1)" filter="url(#jblur)"/>
  <ellipse cx="600" cy="190" rx="145" ry="130" fill="url(#jglow2)" filter="url(#jblur)"/>

  <!-- Ground path — dotted journey line -->
  <path d="M 55 285 C 140 262 210 295 310 268 S 470 238 570 258 S 680 278 720 262"
        fill="none" stroke="#7c3aed" stroke-opacity="0.18" stroke-width="2" stroke-dasharray="5 9"/>

  <!-- Loop 1 — big stuck loop left -->
  <path d="M 128 228 C 78 178 78 125 128 108 C 178 91 228 114 228 162 C 228 210 178 228 128 228 Z"
        fill="rgba(124,58,237,0.05)" stroke="#7c3aed" stroke-opacity="0.28" stroke-width="2.5"/>
  <path d="M 128 228 C 100 242 88 256 108 270" fill="none" stroke="#7c3aed" stroke-opacity="0.38" stroke-width="2" stroke-linecap="round"/>
  <polygon points="108,270 102,258 118,262" fill="#7c3aed" opacity="0.30"/>
  <text x="153" y="168" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="11" fill="#7c3aed" opacity="0.50">vòng lặp</text>

  <!-- Loop 2 — medium loop center-left -->
  <path d="M 292 208 C 257 174 260 138 292 126 C 324 114 356 136 356 170 C 356 204 324 216 292 208 Z"
        fill="rgba(6,182,212,0.04)" stroke="#06b6d4" stroke-opacity="0.24" stroke-width="2"/>
  <path d="M 292 208 C 272 222 268 236 284 250" fill="none" stroke="#06b6d4" stroke-opacity="0.32" stroke-width="1.8" stroke-linecap="round"/>
  <polygon points="284,250 278,238 294,242" fill="#06b6d4" opacity="0.26"/>

  <!-- Loop 3 — small loop breaking open -->
  <path d="M 455 192 C 430 166 433 138 458 130 C 483 122 512 142 506 170"
        fill="none" stroke="#22c55e" stroke-opacity="0.30" stroke-width="2" stroke-dasharray="4 5"/>
  <!-- Break free line -->
  <path d="M 506 170 C 525 155 548 145 575 138" fill="none" stroke="#22c55e" stroke-opacity="0.45" stroke-width="2.2" stroke-linecap="round"/>
  <polygon points="575,138 562,142 566,130" fill="#22c55e" opacity="0.38"/>

  <!-- Person figure — walking forward right side -->
  <ellipse cx="630" cy="312" rx="26" ry="7" fill="#111827" opacity="0.07" filter="url(#jblur)"/>
  <!-- Left leg back -->
  <line x1="625" y1="286" x2="612" y2="310" stroke="#111827" stroke-width="6.5" stroke-linecap="round"/>
  <!-- Right leg forward -->
  <line x1="635" y1="286" x2="648" y2="308" stroke="#1e3a5f" stroke-width="6.5" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="615" y="255" width="30" height="36" rx="10" fill="url(#jg1)"/>
  <!-- Head -->
  <circle cx="630" cy="244" r="14" fill="url(#jg1)"/>
  <!-- Inner light -->
  <circle cx="630" cy="270" r="5" fill="url(#jg2)" opacity="0.70"/>
  <circle cx="630" cy="270" r="2.8" fill="white" opacity="0.55"/>
  <!-- Arm forward -->
  <path d="M 645 267 Q 662 257 672 248" fill="none" stroke="#111827" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Arm back -->
  <path d="M 615 267 Q 600 272 591 280" fill="none" stroke="#1e3a5f" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Horizon light -->
  <circle cx="718" cy="162" r="16" fill="#fbbf24" opacity="0.12"/>
  <circle cx="718" cy="162" r="9" fill="#fbbf24" opacity="0.22"/>
  <circle cx="718" cy="162" r="4" fill="#fbbf24" opacity="0.60"/>
  <line x1="718" y1="148" x2="718" y2="138" stroke="#fbbf24" stroke-opacity="0.30" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="728" y1="152" x2="736" y2="144" stroke="#fbbf24" stroke-opacity="0.25" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="708" y1="152" x2="700" y2="144" stroke="#fbbf24" stroke-opacity="0.25" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="732" y1="162" x2="742" y2="162" stroke="#fbbf24" stroke-opacity="0.22" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="704" y1="162" x2="694" y2="162" stroke="#fbbf24" stroke-opacity="0.22" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Floating dots -->
  <circle cx="105" cy="100" r="3.5" fill="#7c3aed" opacity="0.18"/>
  <circle cx="375" cy="105" r="3" fill="#06b6d4" opacity="0.22"/>
  <circle cx="520" cy="118" r="3" fill="#22c55e" opacity="0.20"/>
  <circle cx="198" cy="294" r="2.5" fill="#f97316" opacity="0.24"/>
  <circle cx="428" cy="302" r="2.5" fill="#7c3aed" opacity="0.18"/>

  <!-- Label -->
  <text x="380" y="360" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="12" fill="#111827" opacity="0.30" letter-spacing="1">nhìn lại · bước tiếp</text>
</svg>
