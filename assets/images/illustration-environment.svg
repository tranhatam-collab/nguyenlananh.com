<svg width="760" height="380" viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Môi trường sống phản chiếu nội tâm">
  <defs>
    <linearGradient id="eg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="eg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="egFloor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <radialGradient id="egGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="egGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="eblur">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="eblurS">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <rect width="760" height="380" rx="20" fill="#fafafe"/>

  <!-- Glow -->
  <ellipse cx="260" cy="200" rx="200" ry="160" fill="url(#egGlow)" filter="url(#eblur)"/>
  <ellipse cx="560" cy="220" rx="170" ry="140" fill="url(#egGlow2)" filter="url(#eblur)"/>

  <!-- Room floor -->
  <path d="M 80 320 L 380 290 L 680 320 L 680 370 L 80 370 Z" fill="url(#egFloor)" opacity="0.7"/>
  <!-- Floor reflection line -->
  <line x1="80" y1="320" x2="680" y2="320" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Back wall -->
  <rect x="80" y="90" width="600" height="232" rx="4" fill="rgba(241,245,249,0.55)"/>
  <!-- Wall skirting -->
  <rect x="80" y="306" width="600" height="14" rx="2" fill="#e2e8f0" opacity="0.8"/>

  <!-- Window on left wall -->
  <rect x="110" y="120" width="140" height="110" rx="8" fill="rgba(6,182,212,0.08)" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="180" y1="120" x2="180" y2="230" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="110" y1="175" x2="250" y2="175" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Light rays through window -->
  <path d="M 110 120 L 70 95" stroke="#fbbf24" stroke-opacity="0.20" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 180 120 L 180 80" stroke="#fbbf24" stroke-opacity="0.18" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 250 120 L 290 95" stroke="#fbbf24" stroke-opacity="0.18" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Window glow on floor -->
  <ellipse cx="180" cy="305" rx="55" ry="12" fill="#fbbf24" opacity="0.08" filter="url(#eblurS)"/>

  <!-- Bookshelf right side -->
  <rect x="560" y="118" width="110" height="188" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Shelf lines -->
  <line x1="560" y1="168" x2="670" y2="168" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="560" y1="218" x2="670" y2="218" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="560" y1="268" x2="670" y2="268" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Books on shelves -->
  <rect x="566" y="148" width="12" height="18" rx="2" fill="#7c3aed" opacity="0.35"/>
  <rect x="580" y="150" width="10" height="16" rx="2" fill="#06b6d4" opacity="0.35"/>
  <rect x="592" y="146" width="14" height="20" rx="2" fill="#22c55e" opacity="0.30"/>
  <rect x="608" y="149" width="11" height="17" rx="2" fill="#f97316" opacity="0.30"/>
  <rect x="621" y="151" width="12" height="15" rx="2" fill="#7c3aed" opacity="0.25"/>
  <rect x="635" y="148" width="10" height="18" rx="2" fill="#06b6d4" opacity="0.30"/>

  <rect x="566" y="198" width="13" height="18" rx="2" fill="#f97316" opacity="0.28"/>
  <rect x="581" y="200" width="11" height="16" rx="2" fill="#7c3aed" opacity="0.30"/>
  <rect x="594" y="197" width="14" height="19" rx="2" fill="#06b6d4" opacity="0.28"/>
  <rect x="610" y="199" width="10" height="17" rx="2" fill="#22c55e" opacity="0.28"/>

  <rect x="566" y="249" width="12" height="17" rx="2" fill="#7c3aed" opacity="0.28"/>
  <rect x="580" y="250" width="14" height="16" rx="2" fill="#06b6d4" opacity="0.25"/>
  <rect x="596" y="248" width="10" height="18" rx="2" fill="#f97316" opacity="0.28"/>

  <!-- Desk / table center -->
  <rect x="240" y="248" width="260" height="14" rx="5" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
  <!-- Desk legs -->
  <rect x="252" y="262" width="8" height="44" rx="3" fill="#cbd5e1"/>
  <rect x="480" y="262" width="8" height="44" rx="3" fill="#cbd5e1"/>

  <!-- Items on desk -->
  <!-- Plant -->
  <rect x="440" y="218" width="8" height="30" rx="3" fill="#22c55e" opacity="0.55"/>
  <ellipse cx="444" cy="216" rx="14" ry="10" fill="#22c55e" opacity="0.45"/>
  <ellipse cx="436" cy="210" rx="10" ry="7" fill="#22c55e" opacity="0.38"/>
  <ellipse cx="453" cy="210" rx="10" ry="7" fill="#22c55e" opacity="0.38"/>
  <rect x="438" y="244" width="12" height="6" rx="3" fill="#e2e8f0"/>

  <!-- Open book on desk -->
  <path d="M 310 248 C 330 242 360 242 370 248" fill="rgba(248,250,252,0.9)" stroke="#cbd5e1" stroke-width="1.2"/>
  <path d="M 310 248 C 290 244 270 242 260 248" fill="rgba(248,250,252,0.9)" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="310" y1="248" x2="310" y2="238" stroke="#cbd5e1" stroke-width="1"/>
  <!-- Book lines -->
  <line x1="268" y1="244" x2="306" y2="244" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="266" y1="247" x2="306" y2="247" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="316" y1="244" x2="366" y2="244" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="2 3"/>

  <!-- Small lamp on desk -->
  <rect x="388" y="222" width="6" height="26" rx="2" fill="#cbd5e1"/>
  <path d="M 382 222 Q 391 212 402 222" fill="#fbbf24" opacity="0.35" stroke="#fbbf24" stroke-opacity="0.40" stroke-width="1"/>
  <circle cx="391" cy="221" r="5" fill="#fbbf24" opacity="0.30"/>
  <ellipse cx="391" cy="248" rx="18" ry="5" fill="#fbbf24" opacity="0.10" filter="url(#eblurS)"/>

  <!-- Person sitting at desk -->
  <ellipse cx="350" cy="247" rx="14" ry="4" fill="#111827" opacity="0.07"/>
  <!-- Body leaning forward -->
  <path d="M 350 226 Q 350 238 354 247" fill="none" stroke="#111827" stroke-width="8" stroke-linecap="round"/>
  <!-- Head tilted toward book -->
  <circle cx="350" cy="218" r="13" fill="url(#eg2)"/>
  <!-- Arms on desk -->
  <path d="M 344 234 Q 325 241 312 247" fill="none" stroke="#111827" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M 357 234 Q 374 241 380 247" fill="none" stroke="#1e3a5f" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Reflection mirror concept — dashed line showing inside=outside -->
  <line x1="380" y1="92" x2="380" y2="316" stroke="#7c3aed" stroke-opacity="0.10" stroke-width="1.5" stroke-dasharray="4 8"/>

  <!-- Floating dust motes / order particles -->
  <circle cx="200" cy="155" r="2.5" fill="#06b6d4" opacity="0.22"/>
  <circle cx="145" cy="200" r="2" fill="#7c3aed" opacity="0.20"/>
  <circle cx="230" cy="240" r="2" fill="#22c55e" opacity="0.22"/>
  <circle cx="520" cy="140" r="2.5" fill="#06b6d4" opacity="0.18"/>
  <circle cx="490" cy="170" r="2" fill="#7c3aed" opacity="0.18"/>

  <!-- Label -->
  <text x="380" y="360" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="12" fill="#111827" opacity="0.30" letter-spacing="1">môi trường sống · nội tâm</text>
</svg>
