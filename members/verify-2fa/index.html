<!doctype html>
<html lang="vi" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Xác thực 2 bước | Nguyễn Lan Anh</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="stylesheet" href="/assets/site.css" />
</head>
<body>
  <main class="container" role="main" style="max-width:480px; margin-top:8vh;">
    <section class="panel">
      <div style="text-align:center; margin-bottom:24px;">
        <img src="/assets/brand/logo-mark.svg" alt="" width="56" height="56" style="margin:0 auto;" />
        <h1 style="font-size:24px; margin:12px 0 4px;">Xác thực 2 bước</h1>
        <p class="meta" style="margin:0;">Nhập mã OTP từ ứng dụng xác thực</p>
      </div>

      <div class="field">
        <label for="twofa-code">Mã OTP (6 số)</label>
        <input id="twofa-code" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="000000" style="font-size:24px; letter-spacing:6px; text-align:center;" autofocus />
      </div>

      <div class="actionsRow">
        <button class="cta" id="twofa-verify-btn" type="button" style="width:100%;">Xác nhận</button>
      </div>

      <p id="twofa-error" class="note" style="color:#c0392b; display:none;"></p>

      <hr style="margin:20px 0; border:none; border-top:1px solid rgba(0,0,0,.08);" />

      <details>
        <summary style="cursor:pointer; font-size:14px; color:rgba(15,23,42,.6);">Không có điện thoại? Dùng mã dự phòng</summary>
        <div class="field" style="margin-top:12px;">
          <label for="twofa-backup">Mã dự phòng</label>
          <input id="twofa-backup" type="text" placeholder="XXXX-XXXX-XXXX" style="font-family:ui-monospace,monospace;" />
        </div>
        <div class="actionsRow">
          <button class="btn" id="twofa-backup-btn" type="button" style="width:100%;">Dùng mã dự phòng</button>
        </div>
      </details>

      <hr style="margin:20px 0; border:none; border-top:1px solid rgba(0,0,0,.08);" />
      <p class="meta" style="text-align:center; font-size:13px;">
        <a href="/api/auth/logout" data-method="post">← Đăng xuất</a>
      </p>
    </section>
  </main>

  <script>
  (function() {
    "use strict";
    var codeInput = document.getElementById("twofa-code");
    var verifyBtn = document.getElementById("twofa-verify-btn");
    var errEl = document.getElementById("twofa-error");
    var backupInput = document.getElementById("twofa-backup");
    var backupBtn = document.getElementById("twofa-backup-btn");

    function showErr(msg) { errEl.textContent = msg; errEl.style.display = "block"; }
    function hideErr() { errEl.style.display = "none"; }

    function verifyCode(code, isBackup) {
      hideErr();
      verifyBtn.disabled = true;
      verifyBtn.textContent = "Đang xác nhận...";

      var payload = isBackup ? { backup_code: code } : { code: code };
      fetch("/api/auth/2fa/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify(payload)
      })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.ok) {
            verifyBtn.textContent = "Thành công!";
            var next = new URLSearchParams(window.location.search).get("next_path") || "/members/dashboard/";
            setTimeout(function() { window.location.href = next; }, 500);
          } else {
            showErr(data.message || "Mã không đúng. Thử lại.");
            verifyBtn.disabled = false;
            verifyBtn.textContent = "Xác nhận";
            codeInput.value = "";
            codeInput.focus();
          }
        })
        .catch(function() {
          showErr("Lỗi kết nối. Thử lại.");
          verifyBtn.disabled = false;
          verifyBtn.textContent = "Xác nhận";
        });
    }

    verifyBtn.addEventListener("click", function() {
      var code = codeInput.value.trim();
      if (!code || code.length !== 6) { showErr("Vui lòng nhập mã 6 số."); return; }
      verifyCode(code, false);
    });

    codeInput.addEventListener("keypress", function(e) {
      if (e.key === "Enter") verifyBtn.click();
    });

    backupBtn.addEventListener("click", function() {
      var code = backupInput.value.trim();
      if (!code) { showErr("Vui lòng nhập mã dự phòng."); return; }
      verifyBtn.disabled = true;
      verifyBtn.textContent = "Đang xác nhận...";
      fetch("/api/auth/2fa/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ backup_code: code })
      })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.ok) {
            verifyBtn.textContent = "Thành công!";
            var next = new URLSearchParams(window.location.search).get("next_path") || "/members/dashboard/";
            setTimeout(function() { window.location.href = next; }, 500);
          } else {
            showErr(data.message || "Mã dự phòng không đúng.");
            verifyBtn.disabled = false;
            verifyBtn.textContent = "Xác nhận";
          }
        })
        .catch(function() {
          showErr("Lỗi kết nối.");
          verifyBtn.disabled = false;
          verifyBtn.textContent = "Xác nhận";
        });
    });
  })();
  </script>
</body>
</html>
