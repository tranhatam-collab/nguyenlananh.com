<svg width="760" height="380" viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lao động sáng tạo — cái chổi và hiện diện">
  <defs>
    <linearGradient id="tg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="tg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="tg3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="tgFloor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <radialGradient id="tgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tgGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="tblur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="tblurS">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <rect width="760" height="380" rx="20" fill="#fafafe"/>

  <!-- Glow blobs -->
  <ellipse cx="300" cy="260" rx="200" ry="140" fill="url(#tgGlow)" filter="url(#tblur)"/>
  <ellipse cx="560" cy="180" rx="160" ry="130" fill="url(#tgGlow2)" filter="url(#tblur)"/>

  <!-- Floor -->
  <rect x="60" y="312" width="640" height="52" rx="4" fill="url(#tgFloor)" opacity="0.65"/>
  <line x1="60" y1="312" x2="700" y2="312" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Floor tiles (subtle grid) -->
  <line x1="160" y1="312" x2="160" y2="364" stroke="#e2e8f0" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="260" y1="312" x2="260" y2="364" stroke="#e2e8f0" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="360" y1="312" x2="360" y2="364" stroke="#e2e8f0" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="460" y1="312" x2="460" y2="364" stroke="#e2e8f0" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="560" y1="312" x2="560" y2="364" stroke="#e2e8f0" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="60" y1="338" x2="700" y2="338" stroke="#e2e8f0" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Dust/debris particles being swept -->
  <circle cx="178" cy="308" r="3" fill="#94a3b8" opacity="0.35"/>
  <circle cx="195" cy="310" r="2" fill="#94a3b8" opacity="0.28"/>
  <circle cx="210" cy="307" r="2.5" fill="#64748b" opacity="0.30"/>
  <circle cx="226" cy="309" r="2" fill="#94a3b8" opacity="0.25"/>
  <circle cx="240" cy="308" r="3" fill="#94a3b8" opacity="0.32"/>
  <circle cx="255" cy="310" r="1.8" fill="#64748b" opacity="0.28"/>
  <circle cx="188" cy="305" r="1.5" fill="#94a3b8" opacity="0.22"/>
  <circle cx="220" cy="304" r="1.5" fill="#94a3b8" opacity="0.20"/>

  <!-- Motion lines from sweeping -->
  <path d="M 155 312 Q 200 306 258 312" fill="none" stroke="#94a3b8" stroke-opacity="0.22" stroke-width="1.5" stroke-dasharray="3 5"/>
  <path d="M 160 316 Q 205 310 260 316" fill="none" stroke="#94a3b8" stroke-opacity="0.16" stroke-width="1" stroke-dasharray="2 6"/>

  <!-- THE BROOM — main subject, angled diagonally -->
  <!-- Broom handle -->
  <line x1="180" y1="108" x2="310" y2="308" stroke="#92400e" stroke-width="7" stroke-linecap="round" opacity="0.75"/>
  <!-- Handle highlight -->
  <line x1="182" y1="108" x2="312" y2="308" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.20"/>

  <!-- Broom head connector -->
  <rect x="295" y="296" width="38" height="10" rx="4" fill="#92400e" opacity="0.65" transform="rotate(-35 295 296)"/>

  <!-- Broom bristles — fan shape -->
  <path d="M 272 308 Q 286 316 300 310 Q 314 304 324 312 Q 336 320 346 310 Q 354 302 362 310"
        fill="none" stroke="#78350f" stroke-width="3.5" stroke-linecap="round" opacity="0.55"/>
  <path d="M 268 312 L 278 326" stroke="#78350f" stroke-width="2.5" stroke-linecap="round" opacity="0.40"/>
  <path d="M 282 310 L 288 326" stroke="#92400e" stroke-width="2.5" stroke-linecap="round" opacity="0.40"/>
  <path d="M 295 308 L 298 326" stroke="#78350f" stroke-width="2.5" stroke-linecap="round" opacity="0.42"/>
  <path d="M 308 308 L 308 326" stroke="#92400e" stroke-width="2.5" stroke-linecap="round" opacity="0.40"/>
  <path d="M 320 308 L 318 326" stroke="#78350f" stroke-width="2.5" stroke-linecap="round" opacity="0.40"/>
  <path d="M 332 308 L 328 326" stroke="#92400e" stroke-width="2.5" stroke-linecap="round" opacity="0.38"/>
  <path d="M 344 308 L 338 326" stroke="#78350f" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <path d="M 354 308 L 346 326" stroke="#92400e" stroke-width="2.5" stroke-linecap="round" opacity="0.32"/>
  <path d="M 362 310 L 354 326" stroke="#78350f" stroke-width="2.5" stroke-linecap="round" opacity="0.30"/>

  <!-- Sweep arc motion line -->
  <path d="M 255 310 Q 310 298 368 312" fill="none" stroke="#f97316" stroke-opacity="0.22" stroke-width="2" stroke-dasharray="3 6"/>

  <!-- Person sweeping — left side holding broom -->
  <ellipse cx="200" cy="308" rx="22" ry="6" fill="#111827" opacity="0.07" filter="url(#tblurS)"/>
  <!-- Legs -->
  <line x1="197" y1="278" x2="186" y2="306" stroke="#111827" stroke-width="6.5" stroke-linecap="round"/>
  <line x1="207" y1="278" x2="216" y2="305" stroke="#1e3a5f" stroke-width="6.5" stroke-linecap="round"/>
  <!-- Body — leaning forward into sweep -->
  <path d="M 200 248 Q 196 262 198 278" fill="none" stroke="#111827" stroke-width="10" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="200" cy="237" r="14" fill="url(#tg1)"/>
  <!-- Arms holding broom handle -->
  <path d="M 208 258 Q 218 250 230 242" fill="none" stroke="#111827" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M 205 268 Q 218 264 228 260" fill="none" stroke="#1e3a5f" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Inner light -->
  <circle cx="200" cy="260" r="5" fill="url(#tg2)" opacity="0.65"/>
  <circle cx="200" cy="260" r="2.8" fill="white" opacity="0.50"/>

  <!-- Right side: orderly space after sweeping -->
  <!-- Clean floor indicator -->
  <ellipse cx="540" cy="318" rx="120" ry="10" fill="#22c55e" opacity="0.06" filter="url(#tblurS)"/>

  <!-- Small potted plant — symbol of life after tidying -->
  <rect x="610" y="272" width="10" height="40" rx="3" fill="#22c55e" opacity="0.50"/>
  <ellipse cx="615" cy="268" rx="18" ry="12" fill="#22c55e" opacity="0.42"/>
  <ellipse cx="604" cy="262" rx="13" ry="9" fill="#22c55e" opacity="0.35"/>
  <ellipse cx="628" cy="262" rx="12" ry="8" fill="#22c55e" opacity="0.35"/>
  <rect x="606" y="308" width="18" height="8" rx="4" fill="#e2e8f0"/>

  <!-- Clean sparkle dots -->
  <circle cx="470" cy="295" r="3" fill="#06b6d4" opacity="0.28"/>
  <circle cx="490" cy="288" r="2" fill="#7c3aed" opacity="0.25"/>
  <circle cx="510" cy="296" r="2.5" fill="#06b6d4" opacity="0.22"/>
  <circle cx="528" cy="287" r="2" fill="#22c55e" opacity="0.28"/>

  <!-- Mindfulness rings — awareness / present moment -->
  <circle cx="560" cy="165" r="55" fill="none" stroke="#7c3aed" stroke-opacity="0.10" stroke-width="1.5"/>
  <circle cx="560" cy="165" r="40" fill="none" stroke="#7c3aed" stroke-opacity="0.13" stroke-width="1.5"/>
  <circle cx="560" cy="165" r="26" fill="none" stroke="#06b6d4" stroke-opacity="0.16" stroke-width="1.5"/>
  <circle cx="560" cy="165" r="14" fill="url(#tg2)" opacity="0.18"/>
  <circle cx="560" cy="165" r="6" fill="url(#tg2)" opacity="0.55"/>
  <circle cx="560" cy="165" r="2.5" fill="white" opacity="0.65"/>

  <!-- Labels inside rings -->
  <text x="560" y="108" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="10" fill="#7c3aed" opacity="0.40">hiện diện</text>

  <!-- Floating accent dots -->
  <circle cx="100" cy="140" r="3.5" fill="#f97316" opacity="0.18"/>
  <circle cx="420" cy="120" r="3" fill="#7c3aed" opacity="0.18"/>
  <circle cx="680" cy="220" r="3" fill="#06b6d4" opacity="0.20"/>
  <circle cx="680" cy="150" r="2.5" fill="#22c55e" opacity="0.22"/>
  <circle cx="120" cy="260" r="2.5" fill="#7c3aed" opacity="0.18"/>

  <!-- Label -->
  <text x="380" y="360" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="12" fill="#111827" opacity="0.30" letter-spacing="1">lao động · kỷ luật · hiện diện</text>
</svg>
