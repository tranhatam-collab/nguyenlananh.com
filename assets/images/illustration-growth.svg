<svg width="760" height="380" viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Con đường tăng trưởng từ bên trong">
  <defs>
    <linearGradient id="gg1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="gg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="ggStem" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.90"/>
    </linearGradient>
    <radialGradient id="ggGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ggGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="gblur">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="gblurSoft">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="760" height="380" rx="20" fill="#fafafe"/>

  <!-- Glow blobs -->
  <ellipse cx="380" cy="320" rx="200" ry="100" fill="url(#ggGlow)" filter="url(#gblur)"/>
  <ellipse cx="200" cy="180" rx="160" ry="140" fill="url(#ggGlow2)" filter="url(#gblur)"/>

  <!-- Grid lines — subtle growth chart -->
  <line x1="80" y1="310" x2="700" y2="310" stroke="#111827" stroke-opacity="0.07" stroke-width="1"/>
  <line x1="80" y1="260" x2="700" y2="260" stroke="#111827" stroke-opacity="0.05" stroke-width="1" stroke-dasharray="3 6"/>
  <line x1="80" y1="210" x2="700" y2="210" stroke="#111827" stroke-opacity="0.05" stroke-width="1" stroke-dasharray="3 6"/>
  <line x1="80" y1="160" x2="700" y2="160" stroke="#111827" stroke-opacity="0.05" stroke-width="1" stroke-dasharray="3 6"/>
  <line x1="80" y1="110" x2="700" y2="110" stroke="#111827" stroke-opacity="0.05" stroke-width="1" stroke-dasharray="3 6"/>

  <!-- Growth curve (the path upward) -->
  <path d="M 90 305 C 160 300 200 295 260 280 S 340 255 390 230 S 480 180 540 148 S 630 110 700 88"
        fill="none" stroke="url(#gg2)" stroke-width="3" stroke-linecap="round" stroke-opacity="0.55"/>

  <!-- Area under curve -->
  <path d="M 90 305 C 160 300 200 295 260 280 S 340 255 390 230 S 480 180 540 148 S 630 110 700 88 L 700 310 L 90 310 Z"
        fill="url(#gg2)" opacity="0.06"/>

  <!-- Data points on curve -->
  <circle cx="90" cy="305" r="5" fill="#22c55e" opacity="0.45"/>
  <circle cx="200" cy="292" r="5" fill="#22c55e" opacity="0.50"/>
  <circle cx="310" cy="268" r="6" fill="#22c55e" opacity="0.55"/>
  <circle cx="420" cy="222" r="6" fill="#7c3aed" opacity="0.60"/>
  <circle cx="540" cy="148" r="7" fill="#7c3aed" opacity="0.65"/>
  <circle cx="660" cy="96" r="7" fill="#06b6d4" opacity="0.70"/>

  <!-- Vertical stems from data points -->
  <line x1="310" y1="268" x2="310" y2="310" stroke="#22c55e" stroke-opacity="0.18" stroke-width="1.5" stroke-dasharray="3 4"/>
  <line x1="420" y1="222" x2="420" y2="310" stroke="#7c3aed" stroke-opacity="0.16" stroke-width="1.5" stroke-dasharray="3 4"/>
  <line x1="540" y1="148" x2="540" y2="310" stroke="#7c3aed" stroke-opacity="0.14" stroke-width="1.5" stroke-dasharray="3 4"/>

  <!-- Plant / tree growing from center — symbolic -->
  <!-- Stem -->
  <rect x="377" y="200" width="6" height="108" rx="3" fill="url(#ggStem)"/>
  <!-- Ground circle -->
  <ellipse cx="380" cy="310" rx="18" ry="5" fill="#22c55e" opacity="0.18"/>

  <!-- Left branch -->
  <path d="M 380 270 C 350 255 330 240 320 222" fill="none" stroke="#22c55e" stroke-opacity="0.55" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Left leaf -->
  <ellipse cx="318" cy="218" rx="14" ry="9" fill="#22c55e" opacity="0.40" transform="rotate(-20 318 218)"/>

  <!-- Right branch -->
  <path d="M 380 250 C 408 235 428 222 438 205" fill="none" stroke="#22c55e" stroke-opacity="0.55" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right leaf -->
  <ellipse cx="440" cy="202" rx="14" ry="9" fill="#22c55e" opacity="0.40" transform="rotate(20 440 202)"/>

  <!-- Top left branch -->
  <path d="M 380 230 C 355 215 342 200 338 185" fill="none" stroke="#22c55e" stroke-opacity="0.45" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="336" cy="182" rx="11" ry="8" fill="#22c55e" opacity="0.35" transform="rotate(-15 336 182)"/>

  <!-- Crown — flower/glow at top -->
  <circle cx="380" cy="192" r="22" fill="#22c55e" opacity="0.10" filter="url(#gblurSoft)"/>
  <circle cx="380" cy="192" r="12" fill="url(#gg2)" opacity="0.35"/>
  <circle cx="380" cy="192" r="6" fill="white" opacity="0.50"/>

  <!-- Star sparkles around crown -->
  <circle cx="365" cy="178" r="2.5" fill="#22c55e" opacity="0.45"/>
  <circle cx="395" cy="175" r="2" fill="#7c3aed" opacity="0.40"/>
  <circle cx="368" cy="164" r="2" fill="#06b6d4" opacity="0.38"/>
  <circle cx="394" cy="163" r="2.5" fill="#22c55e" opacity="0.40"/>
  <circle cx="380" cy="160" r="2" fill="#fbbf24" opacity="0.45"/>

  <!-- Person silhouette — standing, arms raised -->
  <ellipse cx="560" cy="305" rx="20" ry="5" fill="#111827" opacity="0.07" filter="url(#gblurSoft)"/>
  <line x1="555" y1="280" x2="548" y2="302" stroke="#111827" stroke-width="6" stroke-linecap="round"/>
  <line x1="565" y1="280" x2="572" y2="302" stroke="#1e3a5f" stroke-width="6" stroke-linecap="round"/>
  <rect x="548" y="252" width="24" height="32" rx="9" fill="url(#gg1)"/>
  <circle cx="560" cy="241" r="12" fill="url(#gg1)"/>
  <!-- Arms raised up -->
  <path d="M 548 264 Q 532 250 526 235" fill="none" stroke="#111827" stroke-width="5" stroke-linecap="round"/>
  <path d="M 572 264 Q 588 250 594 235" fill="none" stroke="#1e3a5f" stroke-width="5" stroke-linecap="round"/>
  <!-- Light on chest -->
  <circle cx="560" cy="265" r="4.5" fill="url(#gg3)" opacity="0.70"/>
  <circle cx="560" cy="265" r="2.5" fill="white" opacity="0.55"/>

  <!-- Floating dots -->
  <circle cx="130" cy="120" r="3.5" fill="#22c55e" opacity="0.20"/>
  <circle cx="620" cy="148" r="3" fill="#7c3aed" opacity="0.22"/>
  <circle cx="680" cy="200" r="2.5" fill="#06b6d4" opacity="0.20"/>
  <circle cx="100" cy="260" r="3" fill="#f97316" opacity="0.18"/>

</svg>
