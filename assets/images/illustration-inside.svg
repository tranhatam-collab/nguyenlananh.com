<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hành trình đi vào bên trong chính mình">
  <defs>
    <linearGradient id="gPurpleCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="1"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="gCyanGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="gDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="gGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gInner" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="softer" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <clipPath id="clip">
      <rect width="800" height="420" rx="20"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" rx="20" fill="#fafafe"/>

  <!-- Soft glow blobs -->
  <ellipse cx="200" cy="180" rx="200" ry="180" fill="url(#gGlow)" filter="url(#softer)"/>
  <ellipse cx="600" cy="260" rx="180" ry="160" fill="url(#gInner)" filter="url(#softer)"/>

  <!-- Concentric rings — representing layers of the self -->
  <circle cx="400" cy="230" r="180" fill="none" stroke="#7c3aed" stroke-opacity="0.08" stroke-width="1.5"/>
  <circle cx="400" cy="230" r="145" fill="none" stroke="#7c3aed" stroke-opacity="0.11" stroke-width="1.5"/>
  <circle cx="400" cy="230" r="112" fill="none" stroke="#06b6d4" stroke-opacity="0.13" stroke-width="1.5"/>
  <circle cx="400" cy="230" r="80" fill="none" stroke="#06b6d4" stroke-opacity="0.16" stroke-width="1.5"/>
  <circle cx="400" cy="230" r="50" fill="none" stroke="#7c3aed" stroke-opacity="0.20" stroke-width="1.5"/>

  <!-- Dotted orbit line -->
  <circle cx="400" cy="230" r="165" fill="none" stroke="#7c3aed" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="4 8"/>

  <!-- Floating small circles (consciousness dots) -->
  <circle cx="248" cy="130" r="5" fill="#7c3aed" opacity="0.22"/>
  <circle cx="310" cy="80" r="3.5" fill="#06b6d4" opacity="0.28"/>
  <circle cx="490" cy="72" r="4" fill="#7c3aed" opacity="0.20"/>
  <circle cx="555" cy="118" r="3" fill="#06b6d4" opacity="0.25"/>
  <circle cx="590" cy="185" r="5" fill="#22c55e" opacity="0.20"/>
  <circle cx="570" cy="310" r="3.5" fill="#7c3aed" opacity="0.18"/>
  <circle cx="230" cy="318" r="4" fill="#06b6d4" opacity="0.20"/>
  <circle cx="200" cy="248" r="3" fill="#f97316" opacity="0.22"/>
  <circle cx="620" cy="240" r="3" fill="#f97316" opacity="0.18"/>
  <circle cx="160" cy="195" r="5.5" fill="#7c3aed" opacity="0.14"/>

  <!-- Connecting lines from center to consciousness dots -->
  <line x1="400" y1="230" x2="248" y2="130" stroke="#7c3aed" stroke-opacity="0.10" stroke-width="1" stroke-dasharray="3 6"/>
  <line x1="400" y1="230" x2="555" y2="118" stroke="#06b6d4" stroke-opacity="0.10" stroke-width="1" stroke-dasharray="3 6"/>
  <line x1="400" y1="230" x2="590" y2="310" stroke="#7c3aed" stroke-opacity="0.10" stroke-width="1" stroke-dasharray="3 6"/>
  <line x1="400" y1="230" x2="210" y2="310" stroke="#06b6d4" stroke-opacity="0.10" stroke-width="1" stroke-dasharray="3 6"/>

  <!-- Person silhouette — sitting/meditating -->
  <!-- Body base / shadow -->
  <ellipse cx="400" cy="342" rx="42" ry="10" fill="#7c3aed" opacity="0.10" filter="url(#soft)"/>

  <!-- Crossed legs -->
  <path d="M 358 338 Q 380 330 400 328 Q 420 330 442 338" fill="none" stroke="url(#gDark)" stroke-width="6" stroke-linecap="round"/>
  <!-- Left knee -->
  <circle cx="358" cy="338" r="8" fill="url(#gDark)"/>
  <!-- Right knee -->
  <circle cx="442" cy="338" r="8" fill="url(#gDark)"/>
  <!-- Lower body block -->
  <rect x="366" y="315" width="68" height="26" rx="12" fill="url(#gDark)"/>

  <!-- Torso -->
  <rect x="375" y="272" width="50" height="50" rx="14" fill="url(#gDark)"/>

  <!-- Arms resting on knees -->
  <path d="M 375 300 Q 365 315 358 338" fill="none" stroke="url(#gDark)" stroke-width="7" stroke-linecap="round"/>
  <path d="M 425 300 Q 435 315 442 338" fill="none" stroke="url(#gDark)" stroke-width="7" stroke-linecap="round"/>

  <!-- Head -->
  <circle cx="400" cy="255" r="22" fill="url(#gDark)"/>

  <!-- Inner light — glowing center in the person -->
  <circle cx="400" cy="289" r="9" fill="url(#gPurpleCyan)" opacity="0.70"/>
  <circle cx="400" cy="289" r="5" fill="white" opacity="0.55"/>

  <!-- Rays from heart center -->
  <line x1="400" y1="278" x2="400" y2="268" stroke="#7c3aed" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="409" y1="281" x2="416" y2="274" stroke="#06b6d4" stroke-opacity="0.30" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="391" y1="281" x2="384" y2="274" stroke="#06b6d4" stroke-opacity="0.30" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="412" y1="289" x2="422" y2="289" stroke="#7c3aed" stroke-opacity="0.28" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="388" y1="289" x2="378" y2="289" stroke="#7c3aed" stroke-opacity="0.28" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Small accent dots bottom -->
  <circle cx="340" cy="388" r="3" fill="#7c3aed" opacity="0.15"/>
  <circle cx="460" cy="388" r="3" fill="#06b6d4" opacity="0.15"/>
  <circle cx="370" cy="392" r="2" fill="#f97316" opacity="0.18"/>
  <circle cx="430" cy="392" r="2" fill="#22c55e" opacity="0.18"/>
</svg>
